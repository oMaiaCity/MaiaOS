<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Maia City</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/styles.css" />
</head>
<body>
	<div id="view-welcome" style="display: flex;">
		<header class="hero">
			<p class="kicker">Welcome to</p>
			<h1 class="title">Maia City</h1>
		</header>
		<p id="auth-error" class="auth-error" hidden></p>
		<div class="actions">
			<button type="button" id="btn-signup" class="btn primary">Sign up</button>
			<button type="button" id="btn-signin" class="btn">Sign in</button>
		</div>
	</div>

	<div id="view-logged-in" class="me-panel" style="display: none;">
		<nav class="me-tabs" role="tablist" aria-label="Account">
			<button type="button" id="tab-me" class="me-tab" role="tab" aria-selected="true">Me</button>
			<button type="button" id="tab-db" class="me-tab" role="tab" aria-selected="false">DB</button>
		</nav>
		<div id="panel-me" class="me-tab-panel" role="tabpanel">
			<h2 class="me-title">Signed in</h2>
			<dl class="me-dl">
				<dt>Profile name</dt>
				<dd id="profile-name" class="mono"></dd>
				<dt>Account ID</dt>
				<dd id="account-id" class="mono"></dd>
				<dt>Credential ID (sign up only)</dt>
				<dd id="credential-id" class="mono"></dd>
			</dl>
		</div>
		<div id="panel-db" class="me-tab-panel" role="tabpanel" hidden>
			<h2 class="me-title">Database</h2>
			<p class="me-lede">Local CoValue snapshot (read-only).</p>
			<pre id="db-snapshot" class="mono db-pre"></pre>
		</div>
		<button type="button" id="btn-signout" class="btn danger">Sign out</button>
	</div>

	<script type="module" src="/client.mjs"></script>
</body>
</html>
