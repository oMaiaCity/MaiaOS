# MaiaOS — Sentrux rules. Run: sentrux check .

[constraints]
# `authoring-resolver.js`: peer.read + ensure-covalue-core (no read.js / collection-helpers for pre-flight).
# `groups.js`: addGroupMember uses ensure-covalue-core only (breaks groups ↔ collection-helpers ↔ factory-index SCC).
max_cycles = 0
max_coupling = "F"
no_god_files = false

[[layers]]
name = "foundation"
paths = [
	"libs/maia-timeouts/*",
	"libs/maia-db/*",
	"libs/maia-logs/*",
	"libs/maia-validation/*",
	"libs/maia-peer/*",
]
order = 0

[[layers]]
name = "universe_seed"
paths = ["libs/maia-universe/*", "libs/maia-seed/*"]
order = 1

[[layers]]
name = "runtime_stack"
paths = ["libs/maia-runtime/*", "libs/maia-distros/*", "libs/maia-flows/*"]
order = 2

[[layers]]
name = "product_libs"
paths = [
	"libs/maia-game/*",
	"libs/maia-mail/*",
	"libs/maia-storage/*",
	"libs/maia-ucan/*",
	"libs/maia-brand/*",
	"libs/ui/*",
]
order = 3

[[layers]]
name = "services"
paths = ["services/*/*"]
order = 4

[[boundaries]]
from = "libs/*/*"
to = "services/*/*"
reason = "Libraries must not depend on service packages"
