<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;

    /* State palette */
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);

    /* Active state (set by JS) */
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);

    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background radial glow ── */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 720px;
    padding: 20px 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .model-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg {
    width: 10px;
    height: 10px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  /* ── Main stack ── */
  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  /* ── Webcam viewport ── */
  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
  }

  /* Three glow layers */
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  /* Layer 1 — tight inner glow */
  .viewport-wrap::before {
    box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim);
    z-index: 3;
    animation: glow-breathe-1 3s ease-in-out infinite;
  }

  /* Layer 2 — mid spread */
  .viewport-wrap::after {
    box-shadow: 0 0 40px 8px var(--glow-dim);
    z-index: 2;
    animation: glow-breathe-2 4s ease-in-out infinite;
  }

  /* Layer 3 — outer diffuse */
  .viewport-glow {
    inset: -6px;
    border-radius: 22px;
    box-shadow: 0 0 80px 20px var(--glow-dim);
    z-index: 1;
    animation: glow-breathe-3 5s ease-in-out infinite;
  }

  /* State: listening — gentle breathe */
  @keyframes glow-breathe-1 {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes glow-breathe-2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes glow-breathe-3 {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* State: processing — faster, tighter */
  .viewport-wrap.processing::before { animation-duration: 0.8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: 0.3; }

  /* State: speaking — smooth pulse driven by JS amplitude */
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow {
    animation: none;
  }

  /* State: loading — very slow, dim */
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: 0.3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: 0.2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: 0.1; }

  video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    background: #0a0a10;
    transform: scaleX(-1);
    position: relative;
    z-index: 2;
  }

  /* ── Waveform canvas ── */
  .waveform-wrap {
    width: 100%;
    max-width: 480px;
    height: 52px;
    margin-top: 16px;
    flex-shrink: 0;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Transcript ── */
  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
    mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
  }

  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 85%;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(74,222,128,0.08);
    color: #b0d8c0;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10.5px;
    color: var(--c-text-dim);
    margin-top: 5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 1.55em;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.5);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── Controls bar ── */
  .controls {
    width: 100%;
    max-width: 640px;
    padding: 12px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 2;
    gap: 12px;
  }
  #voiceBottom .on-device-pill { margin-left: auto; }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
  }
  #stateText {
    font-variant-numeric: tabular-nums;
  }

  .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .msg.assistant a { color: #93c5fd; }
  .msg.assistant code { font-size: 0.9em; background: rgba(255,255,255,0.06); padding: 0.1em 0.35em; border-radius: 4px; }
  .msg.assistant .msg-json {
    display: block;
    margin: 0;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.45;
    font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: min(70vh, 32rem);
    overflow: auto;
    background: #0a0a12;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #c0d0e0;
  }

  /* ── Mode tabs + chat composer ── */
  .tab-bar {
    display: flex;
    gap: 4px;
    width: 100%;
    max-width: 640px;
    padding: 0 2px 12px;
    flex-shrink: 0;
  }
  .tab {
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }
  .tab:hover { color: var(--c-text); background: var(--c-surface-hover); }
  .tab.active {
    color: var(--c-text-bright);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.12);
  }
  /* Sits between transcript and composer (chat) or above voice controls */
  .state-row {
    width: 100%;
    max-width: 640px;
    display: flex;
    justify-content: center;
    padding: 8px 2px 6px;
    flex-shrink: 0;
  }
  .voice-block { width: 100%; max-width: 640px; flex-shrink: 0; }
  .chat-composer {
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 8px;
    padding: 0 2px 8px;
    flex-shrink: 0;
    align-items: stretch;
  }
  .chat-composer input {
    flex: 1;
    min-width: 0;
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
  }
  .chat-composer input::placeholder { color: var(--c-text-dim); }
  .chat-composer input:focus {
    outline: none;
    border-color: rgba(129,140,248,0.35);
  }
  .state-indicator .dot.ready { background: #64748b; box-shadow: 0 0 8px rgba(100,116,139,0.25); }

  .chat-composer-wrap {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 2px 8px;
    flex-shrink: 0;
  }
  .chat-image-preview {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    background: var(--c-surface);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .chat-image-preview[hidden] { display: none !important; }
  .chat-image-preview img {
    max-height: 72px;
    max-width: 120px;
    object-fit: contain;
    border-radius: 6px;
    background: #0a0a10;
  }
  .btn-remove-img {
    font-family: var(--font-body);
    font-size: 18px;
    line-height: 1;
    width: 28px;
    height: 28px;
    padding: 0;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    color: var(--c-text-dim);
    cursor: pointer;
  }
  .btn-remove-img:hover { color: var(--c-text-bright); background: rgba(255,255,255,0.1); }
  .chat-composer { padding: 0; }
  .btn-attach {
    flex-shrink: 0;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    align-self: stretch;
  }
  .btn-attach:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .btn-attach[aria-pressed="true"] {
    color: #93c5fd;
    border-color: rgba(147,197,253,0.25);
    background: rgba(147,197,253,0.08);
  }
  .msg .msg-doc { margin-bottom: 8px; }
  .msg .msg-doc-img {
    max-width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 8px;
    background: #0a0a10;
    display: block;
  }
  .msg .msg-body-text { word-break: break-word; }
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Moai</h1>
  </div>
  <span class="model-label" id="modelLabel">Gemma 4 E4B</span>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<div class="portal-stack">
  <div class="tab-bar" role="tablist" aria-label="Mode">
    <button type="button" class="tab active" data-mode="chat" id="tabChat" role="tab" aria-selected="true">Chat</button>
    <button type="button" class="tab" data-mode="voice" id="tabVoice" role="tab" aria-selected="false">Voice &amp; camera</button>
  </div>
  <div id="voiceBlock" class="voice-block" hidden>
    <div id="viewportWrap" class="viewport-wrap loading">
      <div class="viewport-glow"></div>
      <video id="video" autoplay muted playsinline></video>
    </div>
    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
    </div>
  </div>

  <div id="messages" class="transcript"></div>

  <div class="state-row" id="stateRow">
    <div class="state-indicator">
      <div id="stateDot" class="dot loading"></div>
      <span id="stateText">Connecting…</span>
    </div>
  </div>

  <div class="chat-composer-wrap" id="chatComposerWrap">
    <div id="chatImagePreview" class="chat-image-preview" hidden></div>
    <form id="chatForm" class="chat-composer" autocomplete="off">
      <input type="file" id="chatImageInput" class="visually-hidden" accept="image/*" tabindex="-1" aria-label="Attach image" />
      <button type="button" class="btn-attach" id="chatImageBtn" title="Add image (OCR / document context)" aria-pressed="false" aria-label="Add image for document or OCR">Image</button>
      <input type="text" id="chatInput" name="m" placeholder="Message or ask about the image…" maxlength="8000" />
      <button type="submit" class="ctrl-btn active">Send</button>
    </form>
  </div>

  <div id="voiceBottom" class="controls" hidden>
    <button type="button" id="cameraToggle" class="ctrl-btn active">Camera On</button>
    <span class="on-device-pill" aria-hidden="true">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><title>On-device</title><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
      On-device
    </span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const video = $('video'), cameraToggle = $('cameraToggle');
const messagesDiv = $('messages'), statusEl = $('status');
const stateDot = $('stateDot'), stateText = $('stateText');
const viewportWrap = $('viewportWrap');
const waveformCanvas = $('waveform');
const waveformCtx = waveformCanvas.getContext('2d');
const tabChat = $('tabChat'), tabVoice = $('tabVoice');
const voiceBlock = $('voiceBlock'), voiceBottom = $('voiceBottom');
const chatForm = $('chatForm'), chatInput = $('chatInput');
const chatImageInput = $('chatImageInput'), chatImageBtn = $('chatImageBtn');
const chatImagePreview = $('chatImagePreview');
const chatComposerWrap = $('chatComposerWrap');

let ws, mediaStream, myvad;
let cameraEnabled = true;
let audioCtx, currentSource;
let state = 'loading';
let ignoreIncomingAudio = false;
let activeMode = 'chat';
let voiceStarted = false;
let waveformRafId = 0;
let thinkingIntervalId = null;

// Streaming audio playback state
let streamSampleRate = 24000;
let streamNextTime = 0;         // When to schedule next chunk
let streamSources = [];         // Active AudioBufferSourceNodes
let streamTtsTime = null;

// ── Waveform Visualizer ──
let analyser, micSource;
const BAR_COUNT = 40;
const BAR_GAP = 3;
let ambientPhase = 0;

function initWaveformCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveformCanvas.getBoundingClientRect();
  waveformCanvas.width = rect.width * dpr;
  waveformCanvas.height = rect.height * dpr;
  waveformCtx.scale(dpr, dpr);
}

function getStateColor() {
  const colors = { ready: '#64748b', listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
  return colors[state] || colors.loading;
}

function drawWaveform() {
  const w = waveformCanvas.getBoundingClientRect().width;
  const h = waveformCanvas.getBoundingClientRect().height;
  waveformCtx.clearRect(0, 0, w, h);

  const barWidth = (w - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
  const color = getStateColor();
  waveformCtx.fillStyle = color;

  let dataArray = null;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
  }

  for (let i = 0; i < BAR_COUNT; i++) {
    let amplitude;
    if (dataArray) {
      // Map bar index to frequency bin
      const binIndex = Math.floor((i / BAR_COUNT) * dataArray.length * 0.6);
      amplitude = dataArray[binIndex] / 255;
    }

    // If no real audio data or very quiet, use ambient drift
    if (!dataArray || amplitude < 0.02) {
      ambientPhase += 0.0001;
      const drift = Math.sin(ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
      amplitude = 0.03 + drift * 0.04;
    }

    const barH = Math.max(2, amplitude * (h - 4));
    const x = i * (barWidth + BAR_GAP);
    const y = (h - barH) / 2;

    waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
    waveformCtx.beginPath();
    const r = Math.min(barWidth / 2, barH / 2, 3);
    waveformCtx.roundRect(x, y, barWidth, barH, r);
    waveformCtx.fill();
  }

  waveformCtx.globalAlpha = 1;
  if (activeMode === 'voice' && voiceStarted) {
    waveformRafId = requestAnimationFrame(drawWaveform);
  }
}

// ── Dynamic glow intensity for speaking state ──
function updateSpeakingGlow() {
  if (state !== 'speaking' || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;
  // Modulate the glow layers based on audio amplitude
  const intensity = 0.3 + avg * 0.7;
  viewportWrap.style.setProperty('--speak-intensity', intensity);
  const spread = 20 + avg * 60;
  const inner = 15 + avg * 25;
  viewportWrap.querySelector('.viewport-glow').style.boxShadow =
    `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
  viewportWrap.style.boxShadow =
    `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
  requestAnimationFrame(updateSpeakingGlow);
}

function clearThinkingTimer() {
  if (thinkingIntervalId !== null) {
    clearInterval(thinkingIntervalId);
    thinkingIntervalId = null;
  }
}

// ── State Machine ──
function setState(newState) {
  state = newState;

  // Update state indicator
  stateDot.className = `dot ${newState}`;
  const labels = {
    loading: 'Loading...',
    ready: 'Ready',
    listening: 'Listening',
    processing: 'Thinking...',
    speaking: 'Speaking',
  };
  clearThinkingTimer();
  if (newState === 'processing') {
    const t0 = Date.now();
    const tick = () => {
      if (state !== 'processing') {
        clearThinkingTimer();
        return;
      }
      const secs = Math.floor((Date.now() - t0) / 1000);
      stateText.textContent = `Thinking... · ${secs}s`;
    };
    tick();
    thinkingIntervalId = setInterval(tick, 1000);
  } else {
    stateText.textContent = labels[newState] || newState;
  }

  // Update viewport glow class
  viewportWrap.className = `viewport-wrap ${newState}`;

  // Reset inline styles from speaking glow
  if (newState !== 'speaking') {
    viewportWrap.style.boxShadow = '';
    viewportWrap.querySelector('.viewport-glow').style.boxShadow = '';
  }

  // Update CSS custom properties for state color (must use resolved values, not nested var())
  const stateVars = {
    ready: ['#64748b', 'rgba(100,116,139,0.12)'],
    listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
    processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
    speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
    loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
  };
  const [glow, glowDim] = stateVars[newState] || stateVars.loading;
  document.documentElement.style.setProperty('--glow', glow);
  document.documentElement.style.setProperty('--glow-dim', glowDim);

  // Kick off speaking glow animation
  if (newState === 'speaking') requestAnimationFrame(updateSpeakingGlow);

  // Raise VAD threshold during speaking to reduce echo false triggers
  if (myvad) {
    myvad.setOptions({ positiveSpeechThreshold: newState === 'speaking' ? 0.92 : 0.5 });
  }

  // Connect/disconnect mic analyser based on state
  if (newState === 'listening' && mediaStream && audioCtx && analyser) {
    if (!micSource) {
      micSource = audioCtx.createMediaStreamSource(mediaStream);
    }
    try { micSource.connect(analyser); } catch {}
  } else if (micSource && newState !== 'listening') {
    try { micSource.disconnect(analyser); } catch {}
  }
}

// ── WebSocket ──
function connect() {
  ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    if (activeMode === 'chat' || !voiceStarted) {
      setState('ready');
    } else {
      setState('listening');
    }
  };
  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') {
      if (msg.transcription) {
        const userMsgs = messagesDiv.querySelectorAll('.msg.user');
        const lastUserMsg = userMsgs[userMsgs.length - 1];
        if (lastUserMsg) {
          const meta = lastUserMsg.querySelector('.meta');
          lastUserMsg.innerHTML = `${msg.transcription}${meta ? meta.outerHTML : ''}`;
        }
      }
      if (msg.display_format === 'json') {
        addMessage('assistant', `<pre class="msg-json">${escapeHtml(msg.text)}</pre>`, `LLM ${msg.llm_time}s · structured`);
      } else {
        addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
      }
      if (msg.mode === 'chat') {
        setState('ready');
        setStatus('connected', 'Connected');
      }
    } else if (msg.type === 'audio_start') {
      if (ignoreIncomingAudio) return;
      streamSampleRate = msg.sample_rate || 24000;
      startStreamPlayback();
    } else if (msg.type === 'audio_chunk') {
      if (ignoreIncomingAudio) return;
      queueAudioChunk(msg.audio);
    } else if (msg.type === 'audio_end') {
      if (ignoreIncomingAudio) {
        ignoreIncomingAudio = false;
        stopPlayback();
        setState('listening');
        return;
      }
      streamTtsTime = msg.tts_time;
      const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
      if (meta) meta.textContent += ` · TTS ${msg.tts_time}s`;
    }
  };
}

function setStatus(cls, text) { statusEl.className = `status-pill ${cls}`; statusEl.textContent = text; }

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fileToBase64Jpeg(file, maxW = 1600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      if (w > maxW) {
        h = Math.round((h * maxW) / w);
        w = maxW;
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        reject(new Error('Canvas unsupported'));
        return;
      }
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const b64 = dataUrl.split(',')[1];
      if (!b64) {
        reject(new Error('Empty image data'));
        return;
      }
      resolve(b64);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('Failed to read image'));
    };
    img.src = url;
  });
}

let pendingChatImageBase64 = null;
let pendingChatImageDataUrl = null;

function clearChatImage() {
  pendingChatImageBase64 = null;
  pendingChatImageDataUrl = null;
  if (chatImagePreview) {
    chatImagePreview.innerHTML = '';
    chatImagePreview.hidden = true;
  }
  if (chatImageInput) chatImageInput.value = '';
  if (chatImageBtn) chatImageBtn.setAttribute('aria-pressed', 'false');
}

function setChatImagePreview() {
  if (!chatImagePreview) return;
  if (!pendingChatImageDataUrl) {
    clearChatImage();
    return;
  }
  chatImagePreview.innerHTML = `<img src="${pendingChatImageDataUrl}" alt="Attached preview" /><button type="button" class="btn-remove-img" title="Remove image">×</button>`;
  chatImagePreview.hidden = false;
  const rm = chatImagePreview.querySelector('.btn-remove-img');
  if (rm) rm.addEventListener('click', (e) => { e.preventDefault(); clearChatImage(); });
}

function addUserChatMessage(text, imageDataUrl) {
  const parts = [];
  if (imageDataUrl) {
    parts.push(`<div class="msg-doc"><img class="msg-doc-img" src="${imageDataUrl}" alt="Attached image" loading="lazy" /></div>`);
  }
  if (text) {
    parts.push(`<div class="msg-body-text">${escapeHtml(text)}</div>`);
  } else if (!imageDataUrl) {
    parts.push(escapeHtml(''));
  }
  addMessage('user', parts.join('') || '<div class="msg-body-text">(image)</div>', null);
}

async function onChatFileSelected(e) {
  const f = e.target && e.target.files && e.target.files[0];
  if (!f || !/^image\//.test(f.type)) return;
  try {
    const b64 = await fileToBase64Jpeg(f);
    pendingChatImageBase64 = b64;
    pendingChatImageDataUrl = 'data:image/jpeg;base64,' + b64;
    if (chatImageBtn) chatImageBtn.setAttribute('aria-pressed', 'true');
    setChatImagePreview();
  } catch (err) {
    console.error(err);
    addMessage('assistant', escapeHtml((err && err.message) || 'Could not read image.'), 'Image');
  }
  e.target.value = '';
}

function sendChat() {
  const text = (chatInput && chatInput.value || '').trim();
  const b64 = pendingChatImageBase64;
  const previewUrl = pendingChatImageDataUrl;
  if (!text && !b64) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  addUserChatMessage(text, previewUrl);
  clearChatImage();
  chatInput.value = '';
  setState('processing');
  setStatus('processing', 'Thinking...');
  const payload = { type: 'chat', text: text || '' };
  if (b64) payload.image = b64;
  ws.send(JSON.stringify(payload));
}

function setMode(mode) {
  activeMode = mode;
  const voice = mode === 'voice';
  tabChat.classList.toggle('active', !voice);
  tabChat.setAttribute('aria-selected', !voice);
  tabVoice.classList.toggle('active', voice);
  tabVoice.setAttribute('aria-selected', voice);
  voiceBlock.hidden = !voice;
  voiceBottom.hidden = !voice;
  if (chatComposerWrap) chatComposerWrap.hidden = voice;
  if (voice) {
    startVoiceIfNeeded();
  } else {
    stopVoice();
    setState('ready');
    if (ws && ws.readyState === WebSocket.OPEN) setStatus('connected', 'Connected');
  }
}

function stopVoice() {
  if (waveformRafId) {
    cancelAnimationFrame(waveformRafId);
    waveformRafId = 0;
  }
  if (myvad) {
    try { myvad.destroy(); } catch (_) { /* */ }
    myvad = null;
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  if (video) video.srcObject = null;
  voiceStarted = false;
  try {
    if (micSource && analyser) micSource.disconnect(analyser);
  } catch (_) { /* */ }
  micSource = null;
  stopPlayback();
}

async function startVoiceIfNeeded() {
  if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
    addMessage('assistant', mediaDevicesSecureContextHint(), 'Voice unavailable');
    return;
  }
  try {
    await startCamera();
    initWaveformCanvas();
    myvad = await vad.MicVAD.new({
      getStream: async () => new MediaStream(mediaStream.getAudioTracks()),
      positiveSpeechThreshold: 0.5,
      negativeSpeechThreshold: 0.25,
      redemptionMs: 600,
      minSpeechMs: 300,
      preSpeechPadMs: 300,
      onSpeechStart: handleSpeechStart,
      onSpeechEnd: handleSpeechEnd,
      onVADMisfire: () => { /* */ },
      onnxWASMBasePath: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
      baseAssetPath: 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/',
    });
    myvad.start();
    const initAudio = () => {
      ensureAudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      document.removeEventListener('click', initAudio);
      document.removeEventListener('keydown', initAudio);
    };
    document.addEventListener('click', initAudio);
    document.addEventListener('keydown', initAudio);
    ensureAudioCtx();
    voiceStarted = true;
    viewportWrap.classList.remove('loading');
    setState('listening');
    if (waveformRafId) cancelAnimationFrame(waveformRafId);
    waveformRafId = requestAnimationFrame(drawWaveform);
  } catch (e) {
    addMessage('assistant', (e && e.message) || String(e), 'Voice setup');
    if (activeMode === 'voice') setMode('chat');
  }
}

// ── Camera ──
function mediaDevicesSecureContextHint() {
  const port = location.port || (location.protocol === 'https:' ? '443' : '80');
  if (location.hostname === '0.0.0.0') {
    return `<p>The address <code>0.0.0.0</code> is not a <em>secure context</em>, so the browser hides the microphone and camera API (<code>navigator.mediaDevices</code>).</p>
      <p>Open <a href="http://localhost:${port}/">http://localhost:${port}</a> or <a href="http://127.0.0.1:${port}/">http://127.0.0.1:${port}</a> instead, then reload.</p>`;
  }
  return '<p>Microphone and camera need a <em>secure context</em>: <code>https://</code>, or <code>http://localhost</code> / <code>127.0.0.1</code>.</p>';
}

async function startCamera() {
  if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
    throw new Error('navigator.mediaDevices is unavailable; use http://localhost:PORT in the address bar (not 0.0.0.0) unless the page is served over HTTPS.');
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    video.srcObject = mediaStream;
    return;
  } catch (e) { console.warn('Video+audio failed:', e.message); }

  const streams = await Promise.allSettled([
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } }),
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }),
  ]);
  mediaStream = new MediaStream();
  streams.forEach(r => { if (r.status === 'fulfilled') r.value.getTracks().forEach(t => mediaStream.addTrack(t)); });
  if (mediaStream.getVideoTracks().length) video.srcObject = mediaStream;
  if (!mediaStream.getAudioTracks().length) { cameraEnabled = false; }
}

function captureFrame() {
  if (!cameraEnabled || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ── VAD Handlers ──
let speakingStartedAt = 0;
const BARGE_IN_GRACE_MS = 800; // Ignore VAD triggers shortly after TTS starts (echo)

function handleSpeechStart() {
  if (activeMode !== 'voice' || !voiceStarted) return;
  if (state === 'speaking') {
    // Ignore echo: don't allow barge-in right after TTS starts playing
    if (Date.now() - speakingStartedAt < BARGE_IN_GRACE_MS) {
      console.log('Barge-in suppressed (echo grace period)');
      return;
    }
    stopPlayback();
    ignoreIncomingAudio = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (activeMode !== 'voice' || !voiceStarted) return;
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);
  const imageBase64 = captureFrame();

  setState('processing');
  setStatus('processing', 'Processing');
  addMessage('user', '<span class="loading-dots"><span></span><span></span><span></span></span>', imageBase64 ? 'with camera' : '');

  const payload = { audio: wavBase64 };
  if (imageBase64) payload.image = imageBase64;
  ws.send(JSON.stringify(payload));
}

// ── Float32 @ 16kHz → WAV base64 ──
function float32ToWavBase64(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ── Streaming Playback ──
function stopPlayback() {
  for (const src of streamSources) {
    try { src.stop(); } catch {}
  }
  streamSources = [];
  currentSource = null;
  streamNextTime = 0;
}

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
  }
}

function startStreamPlayback() {
  stopPlayback();
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  streamNextTime = audioCtx.currentTime + 0.05; // Small initial buffer
  speakingStartedAt = Date.now();
  setState('speaking');
}

function queueAudioChunk(base64Pcm) {
  ensureAudioCtx();

  // Decode base64 -> Int16 PCM -> Float32
  const bin = atob(base64Pcm);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  // Create AudioBuffer and schedule it
  const audioBuffer = audioCtx.createBuffer(1, float32.length, streamSampleRate);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.connect(analyser);

  // Schedule gapless playback
  const startAt = Math.max(streamNextTime, audioCtx.currentTime);
  source.start(startAt);
  streamNextTime = startAt + audioBuffer.duration;

  streamSources.push(source);
  currentSource = source;

  // Clean up when this chunk finishes
  source.onended = () => {
    const idx = streamSources.indexOf(source);
    if (idx !== -1) streamSources.splice(idx, 1);
    // If this was the last chunk and no more are queued, return to listening
    if (streamSources.length === 0 && state === 'speaking') {
      currentSource = null;
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };
}

// ── UI ──
function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ''}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

cameraToggle.addEventListener('click', () => {
  cameraEnabled = !cameraEnabled;
  cameraToggle.classList.toggle('active', cameraEnabled);
  cameraToggle.textContent = cameraEnabled ? 'Camera On' : 'Camera Off';
  video.style.opacity = cameraEnabled ? 1 : 0.3;
});

// ── Init: default text chat; voice + camera only after switching tab ──
function init() {
  initWaveformCanvas();
  window.addEventListener('resize', initWaveformCanvas);
  setState('loading');
  stateText.textContent = 'Connecting...';
  connect();
  tabChat.addEventListener('click', () => { if (activeMode !== 'chat') setMode('chat'); });
  tabVoice.addEventListener('click', () => { if (activeMode !== 'voice') setMode('voice'); });
  if (chatForm) chatForm.addEventListener('submit', (e) => { e.preventDefault(); sendChat(); });
  if (chatImageBtn && chatImageInput) {
    chatImageBtn.addEventListener('click', () => chatImageInput.click());
  }
  if (chatImageInput) chatImageInput.addEventListener('change', onChatFileSelected);
}

init();
</script>
</body>
