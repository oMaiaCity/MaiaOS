# Fly.io configuration for sync service
# Single machine only: deploy uses --ha=false and post-deploy runs fly scale count 1
# Custom domain: sync.next.maia.city
app = "sync-next-maia-city"
org = "maia-city"
primary_region = "fra"

[vm]
  memory = "2048mb"
  swap_size_mb = 512

[build]
  # Build from monorepo root with Dockerfile in services/sync/
  # Use: flyctl deploy --dockerfile services/sync/Dockerfile --config services/sync/fly.toml

[env]
  PORT = "4201"
  NODE_ENV = "production"
  PEER_SYNC_STORAGE = "postgres"

# Secrets: set manually via fly secrets set
# AVEN_MAIA_ACCOUNT, AVEN_MAIA_SECRET - required
# PEER_SYNC_DB_URL - Neon or Fly Postgres connection string (PEER_SYNC_STORAGE=postgres)
# PEER_DB_PATH - PGlite data path (PEER_SYNC_STORAGE=pglite, e.g. /data/sync.db)
# RED_PILL_API_KEY - Optional, for LLM chat

[[services]]
  internal_port = 4201
  protocol = "tcp"
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false
