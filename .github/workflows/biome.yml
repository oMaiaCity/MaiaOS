name: CI

on:
  pull_request:
    branches: [next, main]
  push:
    branches: [main]

jobs:
  biome:
    # Skip on [release] commits - CI already passed pre-merge; only version bump changed
    if: github.event_name != 'push' || github.event.head_commit == null || !startsWith(github.event.head_commit.message, '[release] ')
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate universe registry
        run: bun run universe:registry

      - name: Run Biome
        run: bun run check:ci

      - name: Install Sentrux (Linux x86_64)
        run: |
          curl -fsSL -o /tmp/sentrux https://github.com/sentrux/sentrux/releases/download/v0.5.7/sentrux-linux-x86_64
          chmod +x /tmp/sentrux
          sudo mv /tmp/sentrux /usr/local/bin/sentrux

      - name: Sentrux architectural rules
        run: sentrux check .

      - name: Test @MaiaOS/aven
        run: bun --filter @MaiaOS/aven test

  build:
    if: (github.event_name != 'push' || github.event.head_commit == null || !startsWith(github.event.head_commit.message, '[release] ')) && (github.event_name != 'push' || github.ref != 'refs/heads/main')
    name: Build (app + sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install maia-distros workspace (distros build)
        run: cd libs/maia-distros && bun install --frozen-lockfile

      - name: Generate universe registry
        run: bun run universe:registry

      - name: Build distros
        run: bun run distros:build

      - name: Build app (Docker)
        run: docker build -f services/app/Dockerfile --build-arg VITE_PEER_SYNC_HOST=sync.next.maia.city -t app-build . 2>&1 | tail -30

      - name: Build sync (Docker)
        run: docker build -f services/sync/Dockerfile -t sync-build . 2>&1 | tail -30

      - name: Build landing (Docker)
        run: docker build -f services/landing/Dockerfile -t landing-build . 2>&1 | tail -30

      # Aven: image is built on Fly (remote builder); no local/GitHub Docker for this app.

  build-landing-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.head_commit == null || !startsWith(github.event.head_commit.message, '[release] '))
    name: Build (landing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build landing (Docker)
        run: docker build -f services/landing/Dockerfile -t landing-build . 2>&1 | tail -30
