# Version Tag & Release
# Runs on merge/push to next when commit is NOT [release]. Creates [release] commit, pushes, tags, GitHub release.
# Skipped when commit already starts with [release] (deploy-next runs instead).
# Manual trigger: workflow_dispatch

name: Version Tag & Release

on:
  push:
    branches: [next]
  workflow_dispatch:

jobs:
  version-tag:
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && !startsWith(github.event.head_commit.message, '[release] '))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Load deploy key into ssh-agent for the whole job. checkout's ssh-key does not reliably
      # apply to later steps' git push — without an agent, SSH push gets "Permission denied (publickey)".
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/checkout@v4
        with:
          # Do not persist GITHUB_TOKEN for HTTPS push (GH006 on protected next). Clone uses token in-step only.
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2

      - name: Generate version
        id: version
        run: |
          # GNU date (ubuntu-latest): %-m / %-d avoid zero-padding month/day; tag/commit match sync-version output.
          CORE=$(date -u +%y.%-m.%-d%H%M)
          VERSION="${CORE}-next"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Sync version across all packages
        run: bun run version:sync ${{ steps.version.outputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'services/*/package.json' 'libs/*/package.json' \
            'services/app/src-tauri/Cargo.toml' 'services/app/src-tauri/tauri.conf.json'
          git diff --staged --quiet || git commit -m "[release] ${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"

      - name: Push and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git push origin next
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            --prerelease \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Prerelease (\`-next\`) from merge to \`next\`. Production \`main\` is promoted separately when ready."
