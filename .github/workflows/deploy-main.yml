# Production (main): Fly app `maia-city` only — coming soon + AASA at maia.city.
# Sync + full SPA deploy from `next` (deploy-next.yml).

name: Deploy Main (landing)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-landing:
    name: Deploy landing
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://maia.city
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: latest

      - name: Deploy maia-city
        run: |
          flyctl deploy \
            --dockerfile services/landing/Dockerfile \
            --config services/landing/fly.toml \
            --app maia-city \
            --wait-timeout 300
          flyctl scale count 1 --app maia-city --yes
