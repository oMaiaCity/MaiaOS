# Deploy app + sync to Fly.io
# Runs on [release] commits (created by version-tag workflow). Skipped on [feat]/merge.
# Manual trigger: workflow_dispatch

name: Deploy Next (app + sync)

on:
  push:
    branches: [next]
  workflow_dispatch:

jobs:
  deploy-sync:
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && startsWith(github.event.head_commit.message, '[release] '))
    name: Deploy sync
    runs-on: ubuntu-latest
    environment:
      name: Next
      url: https://sync.next.maia.city/health
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: latest

      - name: Deploy sync
        run: ./services/sync/deploy.sh

  deploy-app:
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && startsWith(github.event.head_commit.message, '[release] '))
    name: Deploy app
    runs-on: ubuntu-latest
    environment:
      name: Next
      url: https://next.maia.city
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: latest

      - name: Deploy app
        run: ./services/app/deploy.sh
